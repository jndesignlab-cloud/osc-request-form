<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSC Service Request Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">

    <section class="header">
      <img src="logo.svg" alt="Logo" class="logo">
      <h1>OSC Service Request Form</h1>
      <p>Submit your request for design, publication, documentation, or promotional support.</p>
    </section>

    <form id="requestForm" class="form-card">

      <div class="form-grid">
        <div class="field">
          <label>Email Address</label>
          <input type="email" name="email" required>
        </div>

        <div class="field">
          <label>Office</label>
          <input type="text" name="office" required>
        </div>

        <div class="field">
          <label>Last Name</label>
          <input type="text" name="lastName" required>
        </div>

        <div class="field">
          <label>First Name</label>
          <input type="text" name="firstName" required>
        </div>

        <div class="field">
          <label>Request Type</label>
          <select name="requestType" required>
            <option value="">Select request type</option>
            <option>Publication Material</option>
            <option>Social Media Post</option>
            <option>Documentation</option>
            <option>Video / Reel</option>
            <option>Tarpaulin / Print Design</option>
            <option>Other</option>
          </select>
        </div>

        <div class="field">
          <label>Date Needed</label>
          <input type="date" name="dateNeeded" required>
        </div>

        <div class="field full">
          <label>Purpose</label>
          <textarea name="purpose" rows="3"></textarea>
        </div>

        <div class="field full">
          <label>Activity Proposal Title</label>
          <input type="text" name="activityTitle">
        </div>

        <div class="field full">
          <label>Description</label>
          <textarea name="description" rows="4"></textarea>
        </div>

        <div class="field">
          <label>Start Date</label>
          <input type="date" name="startDate">
        </div>

        <div class="field">
          <label>End Date</label>
          <input type="date" name="endDate">
        </div>

        <div class="field">
          <label>Start Time</label>
          <input type="time" name="startTime">
        </div>

        <div class="field">
          <label>End Time</label>
          <input type="time" name="endTime">
        </div>

        <div class="field">
          <label>Where</label>
          <input type="text" name="where">
        </div>

        <div class="field">
          <label>Who</label>
          <input type="text" name="who">
        </div>

        <div class="field">
          <label>SDG</label>
          <input type="text" name="sdg">
        </div>

        <div class="field">
          <label>Core Value</label>
          <input type="text" name="coreValue">
        </div>

        <div class="field full">
          <label>Proposal</label>
          <textarea name="proposal" rows="3"></textarea>
        </div>

        <div class="field full">
          <label>Request</label>
          <textarea name="request" rows="3"></textarea>
        </div>

        <div class="field">
          <label>Size / Dimensions</label>
          <input type="text" name="sizeDimensions">
        </div>

        <div class="field">
          <label>Remarks</label>
          <input type="text" name="remarks">
        </div>

        <div class="field full">
          <label>Caption</label>
          <textarea name="caption" rows="3"></textarea>
        </div>

        <div class="field full">
          <label>Design Peg / Reference Upload</label>
          <input type="file" id="designPegFiles" multiple>
        </div>

        <div class="field full">
          <label>Assets Drive Link Upload</label>
          <input type="file" id="assetsFiles" multiple>
        </div>
      </div>

      <button type="submit" id="submitBtn">Submit Request</button>

      <p id="formMessage" class="form-message"></p>

    </form>

  </main>

  <script src="script.js"></script>
</body>
</html>
